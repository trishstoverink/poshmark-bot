<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poshmark Bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Poshmark Bot</h1>
            <div style="display:flex; align-items:center; gap:12px;">
                <div id="posh-status" class="status-badge offline">Poshmark: Not connected</div>
                <span style="color:#8b949e; font-size:13px;" id="user-badge">{{ user }}</span>
                <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;" onclick="accountLogout()">Sign Out</button>
            </div>
        </header>

        <!-- Poshmark Login Panel -->
        <section id="posh-login-panel" class="card">
            <h2>Connect Poshmark Account</h2>
            <!-- Step 1: Credentials -->
            <form id="posh-login-form">
                <div class="form-row">
                    <input type="text" id="posh-username" placeholder="Poshmark Username or Email" required>
                    <input type="password" id="posh-password" placeholder="Poshmark Password" required>
                    <button type="submit" class="btn btn-primary" id="posh-connect-btn">Connect</button>
                </div>
                <div id="posh-login-error" class="error hidden"></div>
            </form>
            <!-- Step 2: Verification Code -->
            <div id="posh-verify-panel" class="hidden" style="margin-top:16px;">
                <p style="color:#4ade80; margin-bottom:10px;">Verification code sent to your email. Enter it below:</p>
                <form id="posh-verify-form">
                    <div class="form-row">
                        <input type="text" id="posh-code" placeholder="Enter verification code" required
                               style="letter-spacing:4px; font-size:18px; text-align:center; max-width:250px;">
                        <button type="submit" class="btn btn-primary" id="posh-verify-btn">Verify</button>
                    </div>
                    <div id="posh-verify-error" class="error hidden"></div>
                </form>
            </div>
        </section>

        <!-- Main Controls (hidden until Poshmark connected) -->
        <div id="main-controls" class="hidden">

            <!-- Stats Bar -->
            <section class="card stats-bar">
                <div class="stat">
                    <span class="stat-value" id="shares-today">0</span>
                    <span class="stat-label">Shares Today</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="offers-today">0</span>
                    <span class="stat-label">Offers Today</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="last-share">--</span>
                    <span class="stat-label">Last Share</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="last-offer">--</span>
                    <span class="stat-label">Last Offer</span>
                </div>
            </section>

            <!-- Share Settings -->
            <section class="card">
                <div class="card-header">
                    <h2>Auto-Share</h2>
                    <button id="share-toggle" class="btn btn-success" onclick="toggleShare()">Start</button>
                </div>
                <div class="settings-grid">
                    <div class="setting">
                        <label>Min delay between shares (seconds)</label>
                        <input type="range" id="share_delay_min" min="2" max="30" value="5"
                               oninput="document.getElementById('share_delay_min_val').textContent=this.value">
                        <span id="share_delay_min_val" class="range-val">5</span>s
                    </div>
                    <div class="setting">
                        <label>Max delay between shares (seconds)</label>
                        <input type="range" id="share_delay_max" min="3" max="60" value="10"
                               oninput="document.getElementById('share_delay_max_val').textContent=this.value">
                        <span id="share_delay_max_val" class="range-val">10</span>s
                    </div>
                    <div class="setting">
                        <label>Share cycle interval (minutes)</label>
                        <input type="number" id="share_interval_minutes" min="30" max="720" value="120" class="input-num">
                    </div>
                    <div class="setting">
                        <label>Share order</label>
                        <select id="share_order">
                            <option value="random">Random</option>
                            <option value="newest_first">Newest First</option>
                            <option value="oldest_first">Oldest First</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="saveSettings()">Save Settings</button>
            </section>

            <!-- Offer Settings -->
            <section class="card">
                <div class="card-header">
                    <h2>Auto-Offer</h2>
                    <button id="offer-toggle" class="btn btn-success" onclick="toggleOffer()">Start</button>
                </div>
                <div class="settings-grid">
                    <div class="setting">
                        <label>Discount from listing price</label>
                        <input type="range" id="offer_discount_percent" min="5" max="50" value="20"
                               oninput="document.getElementById('offer_discount_val').textContent=this.value">
                        <span id="offer_discount_val" class="range-val">20</span>%
                    </div>
                    <div class="setting">
                        <label>Minimum offer price ($)</label>
                        <input type="number" id="offer_min_price" min="3" max="500" value="5" step="1" class="input-num">
                    </div>
                    <div class="setting">
                        <label>Check for likes every (minutes)</label>
                        <input type="number" id="offer_check_interval_minutes" min="5" max="120" value="15" class="input-num">
                    </div>
                    <div class="setting">
                        <label>
                            <input type="checkbox" id="offer_shipping_discount" checked>
                            Offer discounted shipping
                        </label>
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="saveSettings()">Save Settings</button>
            </section>

            <!-- Activity Log -->
            <section class="card">
                <h2>Activity Log</h2>
                <div id="activity-log" class="log-container">
                    <p class="log-empty">No activity yet</p>
                </div>
            </section>

            <button class="btn btn-danger" onclick="doPoshLogout()" style="margin-bottom:16px;">Disconnect Poshmark</button>
        </div>

        <!-- Admin: User Management (hidden for non-admins) -->
        <section id="admin-panel" class="card hidden">
            <h2>Manage Users</h2>
            <div id="user-list" style="margin-bottom:16px;"></div>
            <h3 style="font-size:14px; color:#8b949e; margin-bottom:8px;">Add New User</h3>
            <form id="add-user-form">
                <div class="form-row">
                    <input type="text" id="new-username" placeholder="Username" required>
                    <input type="password" id="new-password" placeholder="Password (6+)" required minlength="6">
                    <button type="submit" class="btn btn-primary">Add User</button>
                </div>
                <div id="add-user-error" class="error hidden"></div>
            </form>
        </section>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
