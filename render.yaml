services:
  - type: web
    name: poshmark-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --preload
    disk:
      name: poshmark-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DB_PATH
        value: /data/poshmark_bot.db
